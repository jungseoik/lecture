<!-- @dsCard group="Components" viewport="700x340" name="Cards, Badges & Stats" subtitle="Surfaces, pills, icon chips, stat tiles" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  body { margin: 0; padding: 28px 30px; background: var(--bg-page); }
  .cap { font-size: 12px; color: var(--text-muted); margin: 0 0 8px; }
  .block { margin-bottom: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, Badge, IconChip, StatCard, FeatureCard } = window.KStudyMatchDesignSystem_624b2d;
    const F = (n) => <i className={"ph-fill ph-" + n} />;
    function Demo() {
      return (
        <div>
          <div className="block">
            <p className="cap">Badges</p>
            <div className="row">
              <Badge tone="solid">추천도 86점</Badge>
              <Badge tone="green">희망전공 일치</Badge>
              <Badge tone="blue">기숙사 제공</Badge>
              <Badge tone="blue">TOPIK 조건 충족</Badge>
              <Badge tone="neutral">국립대</Badge>
              <Badge tone="warning">보완 필요</Badge>
            </div>
          </div>
          <div className="block">
            <p className="cap">Icon chips · Stat tiles</p>
            <div className="row" style={{ marginBottom: 12 }}>
              <IconChip icon={F("wallet")} color="green" />
              <IconChip icon={F("graduation-cap")} color="purple" />
              <IconChip icon={F("currency-krw")} color="blue" />
              <IconChip icon={F("buildings")} color="orange" />
              <IconChip icon={F("chat-circle-dots")} color="sky" />
            </div>
            <div className="row">
              <StatCard icon={F("graduation-cap")} color="purple" label="추천 가능 대학" value="12" unit="개" />
              <StatCard icon={F("piggy-bank")} color="green" label="평균 예상 월 생활비" value="750,000" unit="원" />
            </div>
          </div>
          <div className="block">
            <p className="cap">Feature cards</p>
            <div className="grid3">
              <FeatureCard icon={F("wallet")} color="green" title="생활비 확인" description="지역과 생활 방식에 따른 월별 생활비를 확인하세요." />
              <FeatureCard icon={F("graduation-cap")} color="purple" title="장학금 비교" description="대학별 장학금 제도와 수혜 조건을 비교하세요." />
              <FeatureCard icon={F("chat-circle-dots")} color="sky" title="유학 상담요청" description="전문 상담사에게 유학 관련 상담을 요청하세요." />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
