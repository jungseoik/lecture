<!-- @dsCard group="Colors" viewport="700x180" name="Pastel Accents" subtitle="Icon-chip color pairs by concept" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  body { margin: 0; padding: 28px 30px; background: var(--bg-page); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .pair { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 116px; }
  .chip { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .name { font-size: 12px; color: var(--text-secondary); }
  .use { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="pair"><div class="chip" style="background:var(--accent-green-bg);color:var(--accent-green-fg)"><i class="ph-fill ph-wallet"></i></div><span class="name">Green</span><span class="use">생활비</span></div>
    <div class="pair"><div class="chip" style="background:var(--accent-purple-bg);color:var(--accent-purple-fg)"><i class="ph-fill ph-graduation-cap"></i></div><span class="name">Purple</span><span class="use">장학금</span></div>
    <div class="pair"><div class="chip" style="background:var(--accent-blue-bg);color:var(--accent-blue-fg)"><i class="ph-fill ph-currency-krw"></i></div><span class="name">Blue</span><span class="use">등록금</span></div>
    <div class="pair"><div class="chip" style="background:var(--accent-orange-bg);color:var(--accent-orange-fg)"><i class="ph-fill ph-buildings"></i></div><span class="name">Orange</span><span class="use">기숙사</span></div>
    <div class="pair"><div class="chip" style="background:var(--accent-sky-bg);color:var(--accent-sky-fg)"><i class="ph-fill ph-chat-circle-dots"></i></div><span class="name">Sky</span><span class="use">상담</span></div>
  </div>
</body>
</html>
