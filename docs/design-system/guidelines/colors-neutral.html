<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals / Ink" subtitle="Text, borders, surfaces" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--bg-page); }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 7px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: 9px; border: 1px solid var(--border-subtle); }
  .lbl { font-size: 11px; color: var(--text-secondary); text-align: center; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--neutral-0)"></div><div class="lbl">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><div class="lbl">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-100)"></div><div class="lbl">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><div class="lbl">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><div class="lbl">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><div class="lbl">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-500)"></div><div class="lbl">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-600)"></div><div class="lbl">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-800)"></div><div class="lbl">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-900)"></div><div class="lbl">900</div></div>
  </div>
</body>
</html>
