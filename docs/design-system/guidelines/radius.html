<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radius" subtitle="From chips to hero panels" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 30px; background: var(--bg-page); }
  .row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { width: 64px; height: 64px; background: var(--blue-100); border: 1.5px solid var(--blue-300); }
  .lbl { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="box"><div class="sq" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 6 (badge)</span></div>
    <div class="box"><div class="sq" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 8 (input)</span></div>
    <div class="box"><div class="sq" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 10 (button)</span></div>
    <div class="box"><div class="sq" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 14 (card)</span></div>
    <div class="box"><div class="sq" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 18 (panel)</span></div>
    <div class="box"><div class="sq" style="border-radius:var(--radius-pill)"></div><span class="lbl">pill</span></div>
  </div>
</body>
</html>
