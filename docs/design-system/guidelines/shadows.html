<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / Shadow" subtitle="Low, cool, diffuse" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 34px 30px; background: var(--bg-page); }
  .row { display: flex; gap: 26px; flex-wrap: wrap; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .sq { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .lbl { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="box"><div class="sq" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
    <div class="box"><div class="sq" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm · card</span></div>
    <div class="box"><div class="sq" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
    <div class="box"><div class="sq" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg · hover</span></div>
    <div class="box"><div class="sq" style="box-shadow:var(--shadow-xl)"></div><span class="lbl">xl · modal</span></div>
  </div>
</body>
</html>
