<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 30px; background: var(--bg-page); display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .meta { flex: 0 0 116px; font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .bar { height: 16px; background: var(--blue-300); border-radius: 4px; }
</style>
</head>
<body>
  <div class="row"><span class="meta">2 · 8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="meta">3 · 12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="meta">4 · 16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="meta">6 · 24px (gap-card)</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="meta">8 · 40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="meta">11 · 80px (section)</span><span class="bar" style="width:80px"></span></div>
</body>
</html>
