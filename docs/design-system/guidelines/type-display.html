<!-- @dsCard group="Type" viewport="700x300" name="Display & Headings" subtitle="Pretendard, heavy and tight" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-page); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .meta { flex: 0 0 92px; font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .spec { color: var(--text-display); }
</style>
</head>
<body>
  <div class="row"><span class="meta">Display · 48 / 800</span><span class="spec" style="font-size:var(--text-display-size);line-height:1.1;font-weight:800;letter-spacing:var(--tracking-tight)">한국 유학, 막연하게</span></div>
  <div class="row"><span class="meta">H1 · 36 / 700</span><span class="spec" style="font-size:var(--text-h1-size);font-weight:700;letter-spacing:var(--tracking-tight)">내 조건에 맞는 한국 대학</span></div>
  <div class="row"><span class="meta">H2 · 28 / 700</span><span class="spec" style="font-size:var(--text-h2-size);font-weight:700;letter-spacing:var(--tracking-tight)">이 사이트에서 무엇을 확인할까요?</span></div>
  <div class="row"><span class="meta">H3 · 22 / 700</span><span class="spec" style="font-size:var(--text-h3-size);font-weight:700">학교별 생활비 계산기</span></div>
  <div class="row"><span class="meta">H4 · 18 / 700</span><span class="spec" style="font-size:var(--text-h4-size);font-weight:700">충북대학교</span></div>
</body>
</html>
