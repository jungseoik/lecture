<!-- @dsCard group="Type" viewport="700x150" name="Weights & Numerals" subtitle="Regular → Extra; tabular figures for prices" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--bg-page); display: flex; flex-direction: column; gap: 18px; }
  .weights { display: flex; gap: 26px; flex-wrap: wrap; align-items: baseline; }
  .w { display: flex; flex-direction: column; gap: 3px; }
  .w b { font-size: 26px; color: var(--text-display); letter-spacing: -0.02em; }
  .w span { font-size: 11px; color: var(--text-muted); }
  .nums { display: flex; gap: 28px; align-items: baseline; border-top: 1px solid var(--border-subtle); padding-top: 16px; }
  .num { font-size: 24px; font-weight: 700; color: var(--text-stat); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="weights">
    <div class="w"><b style="font-weight:400">유학</b><span>Regular 400</span></div>
    <div class="w"><b style="font-weight:500">유학</b><span>Medium 500</span></div>
    <div class="w"><b style="font-weight:600">유학</b><span>SemiBold 600</span></div>
    <div class="w"><b style="font-weight:700">유학</b><span>Bold 700</span></div>
    <div class="w"><b style="font-weight:800">유학</b><span>Extra 800</span></div>
  </div>
  <div class="nums">
    <span class="num">2,980,000원</span>
    <span class="num">추천도 86점</span>
    <span class="num">8.2%</span>
  </div>
</body>
</html>
