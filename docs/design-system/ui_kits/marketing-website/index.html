<!-- @dsCard group="Marketing Website" viewport="1200x780" name="Marketing Website" subtitle="Landing · 맞춤 학교 찾기 · 전체 대학 보기 (interactive)" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>K-Study Match — Marketing Website</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  #page { flex: 1; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Landing.jsx"></script>
  <script type="text/babel" src="Match.jsx"></script>
  <script type="text/babel" src="Universities.jsx"></script>
  <script type="text/babel" src="Modals.jsx"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      const stored = (() => { try { return localStorage.getItem("ksm_page"); } catch (e) { return null; } })();
      const [page, setPage] = React.useState(stored || "landing");
      const [modal, setModal] = React.useState(null);
      const nav = (p) => {
        setPage(p);
        try { localStorage.setItem("ksm_page", p); } catch (e) {}
        window.scrollTo({ top: 0, behavior: "auto" });
      };
      const openModal = (type, university) => setModal(type ? { type, university } : null);
      const closeModal = () => setModal(null);
      // expose globally so deeply-nested cards can trigger modals without prop drilling
      window.KSM_MODAL = openModal;
      const Header = window.Header, Footer = window.Footer, AppModals = window.AppModals;
      const Page = page === "match" ? window.Match : page === "universities" ? window.Universities : window.Landing;
      return (
        <React.Fragment>
          <Header active={page} onNavigate={nav} />
          <div id="page"><Page onNavigate={nav} /></div>
          <Footer />
          <AppModals modal={modal} openModal={openModal} close={closeModal} navigate={nav} />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
